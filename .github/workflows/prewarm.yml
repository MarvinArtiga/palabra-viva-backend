name: Backend Prewarm

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

jobs:
  prewarm:
    runs-on: ubuntu-latest
    env:
      BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
      CURL_ARGS: >-
        -L
        --retry 3
        --retry-delay 2
        --retry-all-errors
        --connect-timeout 20
        --max-time 120
    steps:
      - name: Validate config
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${BACKEND_BASE_URL:-}" ]]; then
            echo "ERROR: BACKEND_BASE_URL secret is not set"
            exit 1
          fi
          echo "Using BACKEND_BASE_URL=${BACKEND_BASE_URL}"

      - name: Compute today (UTC)
        id: today
        shell: bash
        run: |
          set -euo pipefail
          TODAY="$(date -u +%F)"
          echo "today=${TODAY}" >> "$GITHUB_OUTPUT"
          echo "UTC today: ${TODAY}"

      - name: Prewarm readings week
        id: readings
        shell: bash
        run: |
          set -euo pipefail
          TODAY="${{ steps.today.outputs.today }}"
          URL="${BACKEND_BASE_URL%/}/api/v1/readings/week/${TODAY}"
          WEEK_FILE="${RUNNER_TEMP}/week.json"

          echo "Calling: ${URL}"
          STATUS=$(curl ${CURL_ARGS} -sS -o "${WEEK_FILE}" -w "%{http_code}" "${URL}")
          echo "Status: ${STATUS}"

          if [[ "${STATUS}" != "200" ]]; then
            echo "ERROR: Non-200 response from ${URL}"
            echo "Response body:"
            cat "${WEEK_FILE}" || true
            exit 1
          fi

          DAYS=$(python3 - << 'PY'
import json
import os

with open(os.environ["WEEK_FILE"], "r", encoding="utf-8") as f:
    data = json.load(f)

out = []
for item in data.get("days", []):
    d = item.get("date")
    if d:
        out.append(d)

if not out:
    raise SystemExit("No days found in /readings/week response")

print(" ".join(out))
PY
)

          echo "Week days: ${DAYS}"
          echo "days=${DAYS}" >> "$GITHUB_OUTPUT"

      - name: Prewarm TTS cache (gospel + psalm)
        shell: bash
        run: |
          set -euo pipefail
          DAYS="${{ steps.readings.outputs.days }}"
          TTS_FILE="${RUNNER_TEMP}/tts_response.bin"

          for DAY in ${DAYS}; do
            for SECTION in gospel psalm; do
              URL="${BACKEND_BASE_URL%/}/api/v1/tts/date/${DAY}?section=${SECTION}&rate=1.0&format=mp3"
              echo "Calling: ${URL}"
              STATUS=$(curl ${CURL_ARGS} -sS -o "${TTS_FILE}" -w "%{http_code}" "${URL}")
              echo "Status: ${STATUS}"

              if [[ "${STATUS}" != "200" ]]; then
                echo "ERROR: Non-200 response from ${URL}"
                echo "Response body:"
                cat "${TTS_FILE}" || true
                exit 1
              fi
            done
          done
