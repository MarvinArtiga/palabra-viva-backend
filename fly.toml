# fly.toml app configuration file generated for palabra-viva-backend on 2026-02-28T23:55:10-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'palabra-viva-backend'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source="data"
  destination="/app/data"
